<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <!-- Nút quay lại -->
    <div class="fixed top-4 left-4 z-50">
        <a href="/" class="bg-white/80 backdrop-blur-md shadow-md p-3 rounded-full flex items-center justify-center">
            <i data-lucide="arrow-left" class="text-teal-700"></i>
        </a>
    </div>

    <div id="main-content" class="max-w-2xl mx-auto pb-24">
        <!-- Nội dung sẽ đổ vào đây -->
        <p class="text-center py-20">Đang tìm bài viết...</p>
    </div>

    <!-- Thanh liên hệ dưới cùng (Sticky Bottom) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t flex gap-4">
        <a href="https://zalo.me/your_phone" class="flex-1 bg-blue-500 text-white text-center py-3 rounded-xl font-bold flex justify-center items-center gap-2">
            <i data-lucide="message-circle" class="w-5 h-5"></i> Nhắn Zalo
        </a>
        <a href="tel:0901234567" class="flex-1 bg-teal-600 text-white text-center py-3 rounded-xl font-bold flex justify-center items-center gap-2">
            <i data-lucide="phone" class="w-5 h-5"></i> Gọi điện
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        fetch('/api/news')
            .then(res => res.json())
            .then(data => {
                const item = data.find(n => n.id == id);
                if (item) {
                    document.getElementById('main-content').innerHTML = `
                        <img src="${item.image}" class="w-full h-[40vh] object-cover shadow-inner">
                        <div class="p-6">
                            <h1 class="text-3xl font-black text-slate-900 leading-tight">${item.title}</h1>
                            <div class="flex items-center gap-2 text-slate-400 text-sm my-4">
                                <i data-lucide="clock" class="w-4 h-4"></i> ${item.date}
                            </div>
                            <div class="prose prose-teal text-lg leading-relaxed text-slate-700">
                                ${item.content}
                            </div>
                        </div>
                    `;
                    lucide.createIcons();
                }
            });
    </script>
</body>
</html>
