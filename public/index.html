<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WEB_MSG Test</title>
</head>
<body style="background: #f0f0f0; padding: 50px; text-align: center;">
    <h1 style="color: teal;">XIN CHÀO! GIAO DIỆN WEB_MSG ĐÃ CHẠY</h1>
    <p>Nếu bạn thấy dòng này, nghĩa là kết nối đã thành công.</p>
    <div id="test-data" style="margin-top: 20px; font-weight: bold;">Đang kiểm tra dữ liệu...</div>

    <script>
        // Kiểm tra xem API có lấy được data không
        fetch('/api/news')
            .then(res => res.json())
            .then(data => {
                document.getElementById('test-data').innerText = "Đã kết nối API! Số bài viết: " + data.length;
            })
            .catch(err => {
                document.getElementById('test-data').innerText = "Lỗi kết nối API: " + err;
            });
    </script>
</body>
</html>

<script>
    fetch('/api/news')
        .then(res => res.json())
        .then(data => {
            console.log("Dữ liệu nhận được:", data); // Kiểm tra trong F12 Console
            
            // Nếu data là mảng, lấy độ dài. Nếu không, báo lỗi.
            if (Array.isArray(data)) {
                document.getElementById('test-data').innerText = "Đã kết nối API! Số bài viết: " + data.length;
            } else {
                document.getElementById('test-data').innerText = "Dữ liệu không đúng định dạng mảng!";
            }
        })
        .catch(err => {
            document.getElementById('test-data').innerText = "Lỗi kết nối API: " + err;
        });
</script>
