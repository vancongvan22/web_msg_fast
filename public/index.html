<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB_MSG | Tin Tức Massage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thêm thư viện Icon cho đẹp -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-teal-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto font-bold text-xl uppercase tracking-widest flex justify-between items-center">
            <span>WEB_MSG</span>
            <div class="space-x-4 text-sm font-normal normal-case">
                <a href="tel:0901234567" class="bg-teal-600 px-4 py-2 rounded-full hover:bg-teal-500 transition">Gọi ngay</a>
            </div>
        </div>
    </nav>

    <header class="py-12 text-center bg-white border-b mb-10">
        <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">TIN TỨC & ƯU ĐÃI</h1>
        <p class="text-slate-500 mt-3 max-w-md mx-auto">Khám phá các liệu trình thư giãn và chương trình khuyến mãi mới nhất từ chúng tôi.</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <!-- Nơi các bài viết sẽ hiện ra -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Hiệu ứng đang tải (Skeleton) -->
            <div class="animate-pulse bg-white rounded-2xl h-80 border border-slate-100"></div>
            <div class="animate-pulse bg-white rounded-2xl h-80 border border-slate-100 hidden md:block"></div>
            <div class="animate-pulse bg-white rounded-2xl h-80 border border-slate-100 hidden lg:block"></div>
        </div>
    </main>

    <script>
        fetch('/api/news')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('news-grid');
                
                // Đổ dữ liệu vào Grid
                grid.innerHTML = data.map(item => `
                    <div class="group bg-white rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-500 overflow-hidden border border-slate-100 flex flex-col">
                        <div class="relative overflow-hidden">
                            <img src="${item.image}" class="w-full h-56 object-cover transform group-hover:scale-110 transition duration-700">
                            <div class="absolute top-4 left-4 bg-teal-600 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">
                                Mới nhất
                            </div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col">
                            <div class="flex items-center text-slate-400 text-[11px] mb-3">
                                <i data-lucide="calendar" class="w-3 h-3 mr-1"></i>
                                ${item.date}
                            </div>
                            <h2 class="font-bold text-xl mb-3 text-slate-800 group-hover:text-teal-700 transition-colors">${item.title}</h2>
                            <p class="text-slate-600 text-sm mb-6 line-clamp-3 leading-relaxed">${item.summary}</p>
                            
                            <div class="mt-auto">
                                <!-- SỬA QUAN TRỌNG TẠI ĐÂY: Dùng thẻ <a> dẫn tới detail.html?id=... -->
                                <a href="detail.html?id=${item.id}" 
                                   class="inline-flex items-center justify-center w-full bg-slate-100 hover:bg-teal-600 hover:text-white text-slate-700 font-bold py-3 px-6 rounded-xl transition-all duration-300">
                                    Xem chi tiết
                                    <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Kích hoạt các Icon Lucide
                lucide.createIcons();
            })
            .catch(err => {
                document.getElementById('news-grid').innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <p class="text-red-500 font-bold">Lỗi tải dữ liệu. Vui lòng kiểm tra file data.json!</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
