<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB_MSG | Trị Liệu & Chăm Sóc Sức Khỏe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/component-loader.js" defer></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div data-component="header"></div>

    <div data-component="hero"></div>

    <div data-component="services"></div>

    <section class="bg-slate-100/60 border-t border-b py-16">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="text-center max-w-md mx-auto mb-12 space-y-2">
                <h2 class="text-2xl md:text-3xl font-black text-slate-900">Tin Tức & Ưu Đãi</h2>
                <p class="text-slate-500 text-sm">Cập nhật các chương trình khuyến mãi độc quyền và kiến thức bảo vệ sức khỏe hữu ích.</p>
            </div>
            
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="pagination" class="flex justify-center items-center gap-2 mt-12"></div>
        </div>
    </section>

    <div data-component="footer"></div>

    <script src="/js/main.js" defer></script>
</body>
</html>
