<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB_MSG | Tin Tức Massage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-teal-700 text-white p-4 shadow-lg">
        <div class="container mx-auto font-bold text-xl uppercase tracking-widest">WEB_MSG</div>
    </nav>

    <header class="py-10 text-center">
        <h1 class="text-3xl font-extrabold text-slate-800">TIN TỨC & ƯU ĐÃI</h1>
        <p class="text-slate-500 mt-2">Cập nhật những dịch vụ mới nhất từ chúng tôi</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <!-- Nơi các bài viết sẽ hiện ra -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full">Đang tải tin tức...</p>
        </div>
    </main>

    <script>
        fetch('/api/news')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('news-grid');
                // Duyệt qua từng bài viết trong mảng data và tạo HTML
                grid.innerHTML = data.map(item => `
                    <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden border border-slate-100">
                        <img src="${item.image}" class="w-full h-52 object-cover">
                        <div class="p-6">
                            <h2 class="font-bold text-xl mb-3 text-slate-800">${item.title}</h2>
                            <p class="text-slate-600 text-sm mb-4 line-clamp-3">${item.summary}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-slate-400">${item.date}</span>
                                <button class="text-teal-600 font-bold text-sm hover:underline">Chi tiết →</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('news-grid').innerHTML = "Lỗi tải dữ liệu!";
            });
    </script>
</body>
</html>
